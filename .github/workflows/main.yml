name: Daily Rate Scraper

on:
  schedule:
    - cron: '45 4 * * *' # Every day at 10:30 AM Nepal Time (04:45 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper Script and Generate JSON
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Scraper"
          git config --global user.email "actions@github.com"

          git add rates.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update gold/silver rates [skip ci]"

          # Get latest remote changes and replay our commit on top
          git pull --rebase origin main

          git push origin main
